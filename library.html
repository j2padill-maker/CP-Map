<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a8090">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CP Scout">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CP Scout — Library</title>
<style>
  :root {
    --bg:          #3a3f44;
    --surface:     #2e3338;
    --panel:       #4a5058;
    --panel-light: #555c64;
    --border:      #6a737d;
    --teal:        #4dd9e8;
    --teal-dim:    #2aabb8;
    --teal-dark:   #1a8090;
    --text:        #f0f4f5;
    --text-dim:    #c0cdd0;
    --text-muted:  #8a9ea3;
    --red:         #f04040;
    --orange:      #f08020;
    --yellow:      #e8d020;
    --green:       #30c860;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; display: flex; flex-direction: column; }

  /* NAV */
  nav { background: var(--surface); border-bottom: 2px solid var(--teal-dark); display: flex; align-items: center; padding: 0 16px; flex-shrink: 0; height: 48px; }
  .nav-brand .nav-logo { font-size: 14px; font-weight: bold; color: var(--teal); letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px rgba(77,217,232,0.4); white-space: nowrap; }
  .nav-tabs { display: flex; gap: 2px; flex: 1; margin-left: 20px; }
  .nav-tab { padding: 0 16px; height: 48px; display: flex; align-items: center; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; color: var(--text-dim); border-bottom: 3px solid transparent; text-decoration: none; transition: all .15s; white-space: nowrap; }
  .nav-tab:hover { color: var(--teal); background: rgba(77,217,232,0.05); }
  .nav-tab.active { color: var(--teal); border-bottom-color: var(--teal); font-weight: bold; }

  /* PAGE */
  .page { flex: 1; padding: 16px; overflow-y: auto; max-width: 1100px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

  /* PAGE HEADER */
  .page-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .page-header h1 { font-size: 13px; letter-spacing: 3px; color: var(--teal); text-transform: uppercase; }
  .page-header p { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-top: 3px; }
  .header-stats { display: flex; gap: 20px; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; }
  .header-stats span { color: var(--teal); font-weight: bold; }

  /* EMPTY STATE */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--text-muted); text-align: center; padding: 60px 40px; }
  .empty-state .es-icon { font-size: 52px; opacity: .3; }
  .empty-state h2 { color: var(--text-dim); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }
  .empty-state p { font-size: 11px; line-height: 1.8; max-width: 420px; }
  .empty-btn { margin-top: 6px; padding: 8px 20px; background: transparent; border: 1px solid var(--teal); color: var(--teal); font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; text-decoration: none; display: inline-block; }
  .empty-btn:hover { background: var(--teal-dark); color: #fff; }

  /* ACTIVE BANNER */
  .active-banner { background: rgba(77,217,232,0.07); border: 1px solid var(--teal-dark); padding: 10px 16px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .active-banner .ab-label { font-size: 9px; letter-spacing: 2px; color: var(--teal); text-transform: uppercase; }
  .active-banner .ab-file  { font-size: 12px; color: var(--text); font-weight: bold; }
  .active-banner .ab-meta  { font-size: 10px; color: var(--text-muted); }
  .active-banner .ab-badge { padding: 2px 10px; font-size: 9px; letter-spacing: 1px; background: rgba(77,217,232,0.15); border: 1px solid var(--teal); color: var(--teal); text-transform: uppercase; margin-left: auto; }

  /* STATION BLOCK */
  .station-block { background: var(--surface); border: 1px solid var(--border); }
  .station-header { display: flex; align-items: center; gap: 12px; padding: 11px 16px; background: var(--panel); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .station-header:hover { background: var(--panel-light); }
  .station-num { font-size: 16px; font-weight: bold; color: var(--teal); letter-spacing: 2px; min-width: 80px; }
  .station-label { font-size: 9px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
  .station-meta { font-size: 10px; color: var(--text-dim); margin-left: auto; }
  .station-toggle { color: var(--text-muted); font-size: 12px; margin-left: 10px; transition: transform .2s; }
  .station-toggle.open { transform: rotate(180deg); }

  /* FILE LIST */
  .file-list { display: flex; flex-direction: column; }
  .file-row { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-bottom: 1px solid rgba(106,115,125,0.25); transition: background .1s; flex-wrap: wrap; }
  .file-row:last-child { border-bottom: none; }
  .file-row:hover { background: rgba(255,255,255,0.02); }
  .file-row.is-active { background: rgba(77,217,232,0.06); border-left: 3px solid var(--teal); padding-left: 13px; }

  .file-icon { font-size: 16px; flex-shrink: 0; opacity: .7; }
  .file-info { flex: 1; min-width: 160px; }
  .file-name { font-size: 11px; color: var(--text); font-weight: bold; word-break: break-word; }
  .file-meta { font-size: 9px; color: var(--text-muted); margin-top: 3px; letter-spacing: 1px; }

  .file-stats { display: flex; gap: 16px; font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
  .file-stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .file-stat .fs-val { font-size: 14px; font-weight: bold; color: var(--teal); }
  .file-stat .fs-label { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }

  .file-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn { padding: 6px 14px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-family: inherit; font-weight: bold; border: 1px solid; transition: all .15s; }
  .btn-set-active { background: var(--teal-dark); border-color: var(--teal); color: #fff; }
  .btn-set-active:hover { background: var(--teal-dim); }
  .btn-active-now { background: rgba(77,217,232,0.15); border-color: var(--teal); color: var(--teal); cursor: default; }
  .btn-delete { background: transparent; border-color: rgba(240,64,64,0.4); color: rgba(240,64,64,0.6); }
  .btn-delete:hover { background: rgba(240,64,64,0.15); border-color: var(--red); color: var(--red); }

  /* ── SNAPSHOTS ── */
  .snap-section { border-top: 1px dashed var(--border); }
  .snap-section-hdr { padding: 7px 16px; font-size: 9px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; background: rgba(0,0,0,0.1); }
  .snap-row { display:flex; align-items:center; gap:12px; padding:10px 16px; border-bottom:1px solid rgba(106,115,125,0.2); flex-wrap:wrap; transition:background .1s; }
  .snap-row:last-child { border-bottom:none; }
  .snap-row:hover { background:rgba(77,217,232,0.04); }
  .snap-icon { font-size:16px; flex-shrink:0; }
  .snap-info { flex:1; min-width:0; }
  .snap-title { font-size:11px; color:var(--text); font-weight:bold; }
  .snap-meta { font-size:10px; color:var(--text-muted); margin-top:2px; }
  .snap-stats { display:flex; gap:10px; flex-shrink:0; }
  .snap-stat { text-align:center; }
  .snap-stat-val { font-size:13px; font-weight:bold; color:var(--teal); }
  .snap-stat-lbl { font-size:8px; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; }
  .snap-stat-val.red { color:var(--red); }
  .snap-stat-val.orange { color:#f4a030; }
  .snap-actions { display:flex; gap:6px; flex-shrink:0; }
  .btn-snap-pdf { background:var(--teal-dark); border:1px solid var(--teal); color:#fff; padding:5px 10px; font-size:10px; letter-spacing:1px; cursor:pointer; font-family:inherit; text-transform:uppercase; }
  .btn-snap-pdf:hover { background:var(--teal-dim); }
  .btn-snap-del { background:transparent; border:1px solid rgba(240,64,64,0.4); color:rgba(240,64,64,0.6); padding:5px 8px; font-size:10px; cursor:pointer; font-family:inherit; }
  .btn-snap-del:hover { background:rgba(240,64,64,0.15); border-color:var(--red); color:var(--red); }

  .active-pill { padding: 2px 8px; font-size: 8px; letter-spacing: 1px; background: rgba(77,217,232,0.15); border: 1px solid var(--teal); color: var(--teal); text-transform: uppercase; flex-shrink: 0; }

  /* STATUS BAR */
  .status-bar { background: var(--surface); border-top: 1px solid var(--border); padding: 5px 14px; font-size: 10px; color: var(--text-dim); letter-spacing: 1px; flex-shrink: 0; display: flex; gap: 20px; align-items: center; }
  .s-label { color: var(--text-muted); }
  .s-val { color: var(--teal); font-weight: bold; }
  #status-msg { color: var(--text); margin-left: auto; font-style: italic; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html" style="text-decoration:none;">
    <div class="nav-logo">⚡ CP Scout</div>
  </a>
  <div class="nav-tabs">
    <a class="nav-tab" href="overview.html">📊 Overview</a>
    <a class="nav-tab" href="map.html">📍 Read Potential Map</a>
    <a class="nav-tab" href="current-map.html">⚡ Current Map</a>
    <a class="nav-tab" href="trends.html">📈 Trends</a>
    <a class="nav-tab" href="field-entry.html">📋 Field Entry</a>
    <a class="nav-tab" href="report.html">📄 Report</a>
    <a class="nav-tab active" href="library.html">📚 Library</a>
  </div>
</nav>

<div class="page" id="page-content">
  <!-- populated by JS -->
</div>

<div class="status-bar">
  <span><span class="s-label">MODULE </span><span class="s-val">LIBRARY</span></span>
  <span><span class="s-label">STATIONS </span><span class="s-val" id="sb-stations">—</span></span>
  <span><span class="s-label">FILES </span><span class="s-val" id="sb-files">—</span></span>
  <span id="status-msg"></span>
</div>

<script>
const LIB_KEY   = 'cp_library';
const SNAP_KEY  = 'cp_snapshots';
const DATA_KEY  = 'cp409_surveyData';
const FNAME_KEY = 'cp409_surveyFileName';

function loadLibrary() {
  try { return JSON.parse(localStorage.getItem(LIB_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveLibrary(lib) {
  try { localStorage.setItem(LIB_KEY, JSON.stringify(lib)); }
  catch(e) { setMsg('⚠ Storage error — library may not have saved.'); }
}
function loadSnapshots() {
  try { return JSON.parse(localStorage.getItem(SNAP_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveSnapshots(snaps) {
  try { localStorage.setItem(SNAP_KEY, JSON.stringify(snaps)); }
  catch(e) { setMsg('⚠ Storage error saving snapshots.'); }
}

// ── ACTIVE ENTRY DETECTION ────────────────────────────────────────────────────
function getActiveId() {
  try { return parseInt(localStorage.getItem('cp_library_activeId') || '0'); }
  catch(e) { return 0; }
}

function setActiveId(id) {
  try { localStorage.setItem('cp_library_activeId', String(id)); }
  catch(e) {}
}

// ── SET ACTIVE ────────────────────────────────────────────────────────────────
function setActive(id) {
  const lib   = loadLibrary();
  const entry = lib.find(e => e.id === id);
  if (!entry) { setMsg('Entry not found.'); return; }

  try {
    localStorage.setItem(DATA_KEY,  JSON.stringify(entry.data));
    localStorage.setItem(FNAME_KEY, entry.filename);
    setActiveId(id);
    setMsg('Station ' + entry.station + ' — "' + entry.filename + '" set as active dataset. Go to Overview to analyze.');
    render();
  } catch(e) {
    setMsg('⚠ Could not load dataset — storage error.');
  }
}

// ── DELETE ENTRY ──────────────────────────────────────────────────────────────
function deleteEntry(id) {
  const lib   = loadLibrary();
  const entry = lib.find(e => e.id === id);
  if (!entry) return;
  if (!confirm('Delete "' + entry.filename + '" from the library?\n\nThis cannot be undone.')) return;

  const updated = lib.filter(e => e.id !== id);
  saveLibrary(updated);

  // If this was the active entry, clear active marker
  if (getActiveId() === id) {
    localStorage.removeItem('cp_library_activeId');
  }

  setMsg('Deleted "' + entry.filename + '" from library.');
  render();
}

// ── TOGGLE STATION SECTION ────────────────────────────────────────────────────
function toggleStation(station) {
  const body   = document.getElementById('st-body-' + station);
  const toggle = document.getElementById('st-tog-'  + station);
  const open   = body.style.display !== 'none';
  body.style.display   = open ? 'none' : '';
  toggle.classList.toggle('open', !open);
}

// ── FORMAT DATE ───────────────────────────────────────────────────────────────
function fmtDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
  } catch(e) { return iso; }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const lib      = loadLibrary();
  const snaps    = loadSnapshots();
  const activeId = getActiveId();
  const page     = document.getElementById('page-content');

  // Status bar
  const allStations = [...new Set([
    ...lib.map(e => e.station),
    ...snaps.map(s => s.station)
  ])];
  document.getElementById('sb-stations').textContent = allStations.length;
  document.getElementById('sb-files').textContent    = lib.length;

  if (!lib.length && !snaps.length) {
    page.innerHTML = `
      <div class="page-header">
        <div><h1>📚 Survey Library</h1><p>Archive of uploaded survey files, organized by station</p></div>
      </div>
      <div class="empty-state">
        <div class="es-icon">📚</div>
        <h2>Library is Empty</h2>
        <p>No survey files have been saved yet. Upload a spreadsheet in Overview, run Analyze Data, then click "Save to Library" to archive it here.</p>
        <a class="empty-btn" href="overview.html">→ Go to Overview</a>
      </div>`;
    return;
  }

  // Find active entry metadata for banner
  const activeEntry = lib.find(e => e.id === activeId);
  const activeFname = localStorage.getItem(FNAME_KEY) || '';

  let html = `
    <div class="page-header">
      <div>
        <h1>📚 Survey Library</h1>
        <p>Archive of uploaded survey files, organized by station</p>
      </div>
      <div class="header-stats">
        <div>STATIONS <span>${allStations.length}</span></div>
        <div>FILES <span>${lib.length}</span></div>
        <div>SNAPSHOTS <span>${snaps.length}</span></div>
      </div>
    </div>`;

  // Active dataset banner
  if (activeFname) {
    const aEntry = activeEntry || { filename: activeFname, station: '—', dateRange: '—', tpCount: '—', cycleCount: '—' };
    html += `
    <div class="active-banner">
      <div>
        <div class="ab-label">Currently Active Dataset</div>
        <div class="ab-file">${aEntry.filename}</div>
        <div class="ab-meta">Station ${aEntry.station} &nbsp;·&nbsp; ${aEntry.dateRange || '—'} &nbsp;·&nbsp; ${aEntry.tpCount || '—'} test points &nbsp;·&nbsp; ${aEntry.cycleCount || '—'} cycles</div>
      </div>
      <div class="ab-badge">⚡ Active</div>
    </div>`;
  }

  // Group by station
  const grouped = {};
  for (const entry of lib) {
    if (!grouped[entry.station]) grouped[entry.station] = { files: [], snaps: [] };
    grouped[entry.station].files.push(entry);
  }
  for (const snap of snaps) {
    if (!grouped[snap.station]) grouped[snap.station] = { files: [], snaps: [] };
    grouped[snap.station].snaps.push(snap);
  }

  const sortedStations = Object.keys(grouped).sort((a, b) => {
    const na = parseInt(a), nb = parseInt(b);
    return (!isNaN(na) && !isNaN(nb)) ? na - nb : a.localeCompare(b);
  });

  for (const station of sortedStations) {
    const { files, snaps: stSnaps } = grouped[station];
    const entries   = files.sort((a, b) => b.id - a.id);
    const hasActive = entries.some(e => e.id === activeId);
    const snapsSorted = stSnaps.sort((a, b) => b.id - a.id);
    const totalItems  = entries.length + snapsSorted.length;

    html += `
    <div class="station-block">
      <div class="station-header" onclick="toggleStation('${station}')">
        <div>
          <div class="station-num">STN ${station}</div>
          <div class="station-label">Station ${station}</div>
        </div>
        <div class="station-meta">${entries.length} file${entries.length !== 1 ? 's' : ''} · ${snapsSorted.length} snapshot${snapsSorted.length !== 1 ? 's' : ''}</div>
        ${hasActive ? '<div class="active-pill">⚡ Active</div>' : ''}
        <div class="station-toggle open" id="st-tog-${station}">▲</div>
      </div>
      <div class="file-list" id="st-body-${station}">`;

    // Survey files
    if (entries.length) {
      html += entries.map(entry => {
        const isActive = entry.id === activeId;
        return `
        <div class="file-row${isActive ? ' is-active' : ''}">
          <div class="file-icon">📄</div>
          <div class="file-info">
            <div class="file-name">${entry.filename}</div>
            <div class="file-meta">Saved ${fmtDate(entry.savedDate)} &nbsp;·&nbsp; Cycles: ${entry.dateRange || '—'}</div>
          </div>
          <div class="file-stats">
            <div class="file-stat">
              <div class="fs-val">${entry.tpCount || '—'}</div>
              <div class="fs-label">Test Points</div>
            </div>
            <div class="file-stat">
              <div class="fs-val">${entry.cycleCount || '—'}</div>
              <div class="fs-label">Cycles</div>
            </div>
          </div>
          <div class="file-actions">
            ${isActive
              ? '<button class="btn btn-active-now">⚡ Active</button>'
              : `<button class="btn btn-set-active" onclick="setActive(${entry.id})">Set Active</button>`}
            <button class="btn btn-delete" onclick="deleteEntry(${entry.id})">✕</button>
          </div>
        </div>`;
      }).join('');
    }

    // Snapshots
    if (snapsSorted.length) {
      html += `<div class="snap-section">
        <div class="snap-section-hdr">📸 Map Snapshots</div>`;
      html += snapsSorted.map(snap => {
        const s = snap.stats || {};
        const mapLabel = snap.mapType === 'current' ? '⚡ Current Map' : '📍 Read Potential Map';
        return `
        <div class="snap-row">
          <div class="snap-icon">📸</div>
          <div class="snap-info">
            <div class="snap-title">${fmtDate(snap.savedDate)} &nbsp;·&nbsp; ${snap.tech} &nbsp;·&nbsp; <span style="color:var(--teal-dim);font-size:10px">${mapLabel}</span></div>
            <div class="snap-meta">${snap.notes || 'No notes'}</div>
          </div>
          <div class="snap-stats">
            <div class="snap-stat"><div class="snap-stat-val">${s.total || 0}</div><div class="snap-stat-lbl">Pins</div></div>
            <div class="snap-stat"><div class="snap-stat-val red">${s.critical || 0}</div><div class="snap-stat-lbl">Critical</div></div>
            <div class="snap-stat"><div class="snap-stat-val orange">${s.concern || 0}</div><div class="snap-stat-lbl">Concern</div></div>
          </div>
          <div class="snap-actions">
            <button class="btn-snap-pdf" onclick="exportSnapshotPDF(${snap.id})">📄 Export PDF</button>
            <button class="btn-snap-del" onclick="deleteSnapshot(${snap.id})">✕</button>
          </div>
        </div>`;
      }).join('');
      html += `</div>`;
    }

    html += `</div></div>`;
  }

  page.innerHTML = html;
}

// ── DELETE SNAPSHOT ───────────────────────────────────────────────────────────
function deleteSnapshot(id) {
  const snaps = loadSnapshots();
  const snap  = snaps.find(s => s.id === id);
  if (!snap) return;
  if (!confirm('Delete this snapshot from ' + fmtDate(snap.savedDate) + '?\n\nThis cannot be undone.')) return;
  saveSnapshots(snaps.filter(s => s.id !== id));
  setMsg('Snapshot deleted.');
  render();
}

// ── EXPORT SNAPSHOT AS PDF ────────────────────────────────────────────────────
function exportSnapshotPDF(id) {
  const snaps = loadSnapshots();
  const snap  = snaps.find(s => s.id === id);
  if (!snap) { setMsg('Snapshot not found.'); return; }

  const date    = fmtDate(snap.savedDate);
  const mapLabel = snap.mapType === 'current' ? 'Current Map (Amp Reads)' : 'Read Potential Map';
  const s       = snap.stats || {};

  // Build pin table rows
  const pinRows = (snap.pins || [])
    .filter(p => p.placed)
    .sort((a, b) => (parseInt(a.tpNum.replace(/\D/g,''))||0) - (parseInt(b.tpNum.replace(/\D/g,''))||0))
    .map(p => {
      const statusColors = { red:'#f04040', orange:'#f4a030', yellow:'#d4c020', green:'#20a050', none:'#8a9ea3' };
      const statusLabels = { red:'CRITICAL', orange:'CONCERN', yellow:'ELEVATED', green:'NORMAL', none:'NO DATA' };
      const color = statusColors[p.color] || statusColors.none;
      const label = statusLabels[p.color] || 'NO DATA';
      const reads = p.offRead !== null
        ? `Off: ${p.offRead.toFixed(3)}V | On: ${p.onRead !== null ? p.onRead.toFixed(3) + 'V' : '—'} | Δ${p.diff}mV`
        : 'No data';
      return `<tr>
        <td style="padding:5px 8px;border-bottom:1px solid #ddd;font-weight:bold">${p.tpNum}</td>
        <td style="padding:5px 8px;border-bottom:1px solid #ddd">${p.address}</td>
        <td style="padding:5px 8px;border-bottom:1px solid #ddd;color:${color};font-weight:bold">${label}</td>
        <td style="padding:5px 8px;border-bottom:1px solid #ddd;font-family:monospace;font-size:11px">${reads}</td>
      </tr>`;
    }).join('');

  const rectInfo = snap.rectifier
    ? `${snap.rectifier.address || '—'} &nbsp;·&nbsp; ${snap.rectifier.amp || '—'}A / ${snap.rectifier.volt || '—'}V`
    : 'Not recorded';

  const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CP Scout Snapshot — Station ${snap.station} — ${date}</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 20px; color: #1a2a2e; font-size: 12px; }
  .header { background: #1a8090; color: white; padding: 16px 20px; margin-bottom: 16px; }
  .header h1 { margin: 0 0 4px; font-size: 18px; letter-spacing: 1px; }
  .header p  { margin: 0; font-size: 11px; opacity: 0.85; }
  .meta-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .meta-box { background: #f0f8f9; border: 1px solid #c0d8dc; padding: 10px; text-align: center; }
  .meta-val { font-size: 20px; font-weight: bold; color: #1a8090; }

  .meta-val.red { color: #f04040; }
  .meta-val.orange { color: #f4a030; }
  .section-title { font-size: 11px; font-weight: bold; color: #1a8090; letter-spacing: 2px; text-transform: uppercase; border-bottom: 2px solid #1a8090; padding-bottom: 4px; margin: 16px 0 10px; }

  .no-map { background: #f5f5f5; border: 1px solid #c0d8dc; padding: 40px; text-align: center; color: #8a9ea3; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { background: #1a8090; color: white; padding: 7px 8px; text-align: left; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
  tr:nth-child(even) { background: #f7fbfc; }
  .notes-box { background: #f0f8f9; border: 1px solid #c0d8dc; padding: 10px 14px; font-style: italic; color: #3a5a60; }
  .footer { margin-top: 20px; padding-top: 10px; border-top: 1px solid #c0d8dc; font-size: 10px; color: #8a9ea3; display: flex; justify-content: space-between; }
  @media print { body { padding: 10px; } .no-print { display: none; } }
</style>
</head>
<body>
<div class="header">
  <h1>⚡ CP Scout — Station ${snap.station} Map Snapshot</h1>

</div>

<div class="meta-grid">
  <div class="meta-box"><div class="meta-val">${s.total || 0}</div><div class="meta-lbl">Total Pins</div></div>
  <div class="meta-box"><div class="meta-val red">${s.critical || 0}</div><div class="meta-lbl">Critical</div></div>
  <div class="meta-box"><div class="meta-val orange">${s.concern || 0}</div><div class="meta-lbl">Concern</div></div>
  <div class="meta-box"><div class="meta-val">${s.normal || 0}</div><div class="meta-lbl">Normal</div></div>
</div>

${snap.notes ? `<div class="section-title">Notes</div><div class="notes-box">${snap.notes}</div>` : ''}

<div class="section-title">Rectifier</div>
<div style="padding:8px 12px;background:#f0f8f9;border:1px solid #c0d8dc;font-family:monospace">${rectInfo}</div>

${snap.mapImage
  ? `<img class="map-img" src="${snap.mapImage}" alt="Map snapshot">`
  : `<div class="no-map">Map image not available — snapshot was saved without image data</div>`}

  const blob = new Blob([html], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  const win  = window.open(url, '_blank');
  if (!win) setMsg('Allow popups to export PDF.');
  setTimeout(() => URL.revokeObjectURL(url), 30000);
  setMsg('PDF export opened — use your browser\'s Print dialog (Ctrl+P) and choose "Save as PDF".');
}

function setMsg(msg) {
  const el = document.getElementById('status-msg');
  if (el) el.textContent = msg;
  setTimeout(() => { const e = document.getElementById('status-msg'); if (e) e.textContent = ''; }, 5000);
}

render();
</script>
